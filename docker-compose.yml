services:
  frontend:
    image: node:20
    container_name: lifeos-frontend
    working_dir: /app
    user: "1000:1000"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - homelab

  backend:
    build:
      context: ./backend   # 👈 THIS is where your Dockerfile is
    container_name: lifeos-backend
    ports:
      - "5000:5000"
    networks:
      - homelab
networks:
  homelab:
    external: true