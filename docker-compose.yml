services:
  db:
    image: postgres:15
    container_name: lifeos-db
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    volumes:
      - lifeos_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - homelab

  frontend:
    image: node:20
    container_name: lifeos-frontend
    working_dir: /app
    env_file:
      - .env
    user: "1000:1000"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - homelab

  backend:
    build:
      context: ./backend
    container_name: lifeos-backend
    working_dir: /app/backend
    environment:
      - DATABASE_URL=postgresql://lifeos:lifeos@db:5432/lifeos
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - .:/app   # 🔥 CRITICAL: gives container access to .git + full repo
    networks:
      - homelab

networks:
  homelab:
    external: true

volumes:
  lifeos_postgres_data:
